<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe | Recipe Share</title>
  <link rel="stylesheet" href="/css/general.css">
  <link rel="stylesheet" href="/css/recipe.css">
  <script src="/js/recipe.js" defer></script>
</head>
<body>
<header class="site-header">
  <h1>
    Welcome to the
    <span class="brand-title">
      Recipe Share
      <img class="brand-logo" src="/src/RS-logo.png" alt="Recipe Share logo">
    </span>
  </h1>
  <p>Discover delicious recipes and share your own!</p>
  <nav class="site-nav" aria-label="Main navigation">
    <ul>
      <li><a href="/">Recipes</a></li>
      <li><a href="/publish">Publish Recipe</a></li>
      <li><a href="/saved">Saved Recipes</a></li>
      <li><a href="/account">Account</a></li>
      <li><a href="/about">About Us</a></li>
    </ul>
  </nav>
</header>
  <main class="page-main">
    <article class="recipe-page-card">
      <img id="recipe-page-image" src="" alt="">
      <div>
        <h2 id="recipe-page-title">Recipe title</h2>
        <p id="recipe-page-meta">Category · Time · Difficulty</p>
        <h3>Ingredients</h3>
        <ul id="recipe-page-ingredients"></ul>
        <h3>Steps</h3>
        <ol id="recipe-page-steps"></ol>
        <p id="recipe-page-comment"></p>
      </div>
    </article>
  </main>
<footer class="site-footer">
  <p>&copy; 2026 Recipe Share. All rights reserved.</p>
</footer>
</body>
</html>
